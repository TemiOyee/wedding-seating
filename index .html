<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Seating – Faridah & Michael</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #faf6f0; --warm-white: #fff9f3;
    --gold: #c9a84c; --gold-light: #e8d5a3; --gold-dark: #9a7a2e;
    --blush: #e8c4b8; --text: #2a1f1a; --text-light: #6b5a52;
    --border: rgba(201,168,76,0.3);
  }
  body { font-family:'Cormorant Garamond',serif; background:var(--cream); min-height:100vh; color:var(--text); overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%,rgba(232,197,163,0.18) 0%,transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 90%,rgba(138,158,138,0.12) 0%,transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%,rgba(201,168,76,0.06) 0%,transparent 70%);
  }
  .page { position:relative; z-index:1; }
  header { text-align:center; padding:3rem 2rem 2rem; }
  .ornament { display:block; font-size:1.4rem; color:var(--gold); letter-spacing:0.5em; margin-bottom:0.5rem; opacity:0.7; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,6vw,3.8rem); font-weight:400; letter-spacing:0.04em; line-height:1.15; }
  h1 em { font-style:italic; color:var(--gold-dark); }
  .subtitle { margin-top:0.75rem; font-size:1.15rem; color:var(--text-light); font-style:italic; letter-spacing:0.05em; }
  .divider { display:flex; align-items:center; gap:1rem; max-width:400px; margin:1.5rem auto 0; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(to right,transparent,var(--gold-light),transparent); }
  .divider-diamond { width:8px; height:8px; background:var(--gold); transform:rotate(45deg); opacity:0.6; }

  main { max-width:720px; margin:0 auto; padding:1rem 1.5rem 4rem; }
  .card {
    background:var(--warm-white); border:1px solid var(--border); border-radius:2px;
    padding:2.5rem 3rem;
    box-shadow:0 2px 20px rgba(42,31,26,0.06),0 0 0 6px rgba(201,168,76,0.04);
    position:relative; overflow:hidden;
  }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--gold),var(--blush),var(--gold),transparent); }
  @media(max-width:500px){.card{padding:1.8rem 1.5rem;}}

  .tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:2rem; }
  .tab-btn { background:none; border:none; font-family:'Cormorant Garamond',serif; font-size:0.95rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-light); padding:0.6rem 1.4rem; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
  .tab-btn.active { color:var(--gold-dark); border-bottom-color:var(--gold); }
  .tab-btn:hover:not(.active) { color:var(--text); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  .form-label { display:block; font-size:0.82rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-light); margin-bottom:0.6rem; }
  .search-wrap { display:flex; gap:0.75rem; align-items:stretch; }
  input[type="text"] { flex:1; font-family:'Cormorant Garamond',serif; font-size:1.15rem; padding:0.75rem 1rem; border:1px solid var(--border); background:var(--cream); color:var(--text); border-radius:2px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  input[type="text"]:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.12); }
  input[type="text"]::placeholder { color:var(--gold-light); }

  .btn { font-family:'Cormorant Garamond',serif; font-size:0.9rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.75rem 1.6rem; border:1px solid var(--gold); background:var(--gold); color:#fff8ec; border-radius:2px; cursor:pointer; transition:background 0.2s,transform 0.1s; white-space:nowrap; }
  .btn:hover { background:var(--gold-dark); border-color:var(--gold-dark); }
  .btn:active { transform:scale(0.98); }
  .btn-outline { background:transparent; color:var(--gold-dark); }
  .btn-outline:hover { background:rgba(201,168,76,0.08); }
  .btn-sm { font-size:0.78rem; padding:0.45rem 0.9rem; }

  /* LOADING */
  .loading-wrap { text-align:center; padding:2rem 1rem; }
  .spinner { display:inline-block; width:32px; height:32px; border:3px solid var(--gold-light); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:0.8rem; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-size:1rem; color:var(--text-light); font-style:italic; }

  /* RESULT */
  #result { margin-top:1.8rem; animation:fadeUp 0.4s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .result-found { text-align:center; padding:2rem 1.5rem; background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(232,196,184,0.08)); border:1px solid var(--border); border-radius:2px; }
  .result-found .greeting { font-size:1rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-light); margin-bottom:0.3rem; }
  .result-found .guest-name { font-family:'Playfair Display',serif; font-size:clamp(1.5rem,4vw,2rem); font-style:italic; color:var(--text); margin-bottom:1.2rem; }
  .seat-cards { display:inline-flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
  .seat-card { background:var(--warm-white); border:1px solid var(--gold-light); border-radius:2px; padding:1rem 2rem; display:flex; flex-direction:column; align-items:center; gap:0.15rem; min-width:110px; }
  .seat-card .sc-label { font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-light); }
  .seat-card .sc-value { font-family:'Playfair Display',serif; font-size:1.9rem; font-weight:600; color:var(--gold-dark); line-height:1.1; }
  .result-extra { margin-top:1rem; font-size:0.9rem; color:var(--text-light); font-style:italic; }
  .result-not-found { text-align:center; padding:1.5rem; color:var(--text-light); font-style:italic; font-size:1.05rem; border:1px dashed var(--border); border-radius:2px; }

  /* ADMIN */
  .admin-intro { font-size:0.95rem; color:var(--text-light); line-height:1.7; margin-bottom:1.2rem; }
  .admin-intro strong { color:var(--text); }

  .col-tabs { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }
  .col-tab { font-family:'Cormorant Garamond',serif; font-size:0.9rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.5rem 1.2rem; border:1px solid var(--border); background:transparent; color:var(--text-light); border-radius:2px; cursor:pointer; transition:all 0.2s; }
  .col-tab.active { background:var(--gold); border-color:var(--gold); color:#fff8ec; }
  .col-tab:hover:not(.active) { border-color:var(--gold); color:var(--gold-dark); }

  .col-progress { font-size:0.8rem; color:var(--text-light); font-style:italic; margin-bottom:0.8rem; }
  .col-progress span { color:var(--gold-dark); font-weight:600; }

  .seat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; margin-bottom:1.5rem; }
  @media(max-width:480px){.seat-grid{grid-template-columns:repeat(2,1fr);}}
  .seat-input-wrap { display:flex; flex-direction:column; gap:0.25rem; }
  .seat-input-label { font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-light); }
  .seat-input { font-family:'Cormorant Garamond',serif; font-size:0.95rem; padding:0.5rem 0.6rem; border:1px solid var(--border); background:var(--cream); color:var(--text); border-radius:2px; outline:none; transition:border-color 0.2s; width:100%; }
  .seat-input:focus { border-color:var(--gold); }
  .seat-input.filled { background:rgba(201,168,76,0.06); border-color:rgba(201,168,76,0.4); }
  .seat-input::placeholder { color:#cdbfa8; font-style:italic; font-size:0.85rem; }

  .section-head { font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-light); margin:1.5rem 0 0.7rem; padding-bottom:0.4rem; border-bottom:1px solid var(--border); }
  .all-columns-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; }
  @media(max-width:560px){.all-columns-grid{grid-template-columns:repeat(2,1fr);}}
  .col-summary { border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .col-summary-head { background:var(--cream); padding:0.4rem 0.7rem; font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold-dark); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .col-summary-count { font-size:0.7rem; color:var(--text-light); font-style:italic; text-transform:none; letter-spacing:0; }
  .col-summary-body { max-height:180px; overflow-y:auto; }
  .col-summary-row { display:flex; justify-content:space-between; padding:0.3rem 0.7rem; font-size:0.82rem; border-bottom:1px solid rgba(201,168,76,0.08); color:var(--text); }
  .col-summary-row:last-child { border-bottom:none; }
  .col-summary-row .sn { color:var(--text-light); font-size:0.75rem; }
  .col-summary-empty { padding:0.5rem 0.7rem; font-size:0.8rem; color:var(--text-light); font-style:italic; }

  .actions { display:flex; gap:0.75rem; flex-wrap:wrap; margin-top:1.5rem; align-items:center; }

  .status { margin-top:1rem; padding:0.8rem 1rem; border-radius:2px; font-size:0.9rem; text-align:center; }
  .status.success { background:rgba(138,158,138,0.12); border:1px solid rgba(138,158,138,0.3); color:#4a6b4a; }
  .status.error { background:rgba(200,80,80,0.08); border:1px solid rgba(200,80,80,0.2); color:#9a3030; }

  .save-indicator { font-size:0.82rem; color:var(--gold-dark); font-style:italic; display:none; align-items:center; gap:0.4rem; }
  .save-indicator.show { display:flex; }
  .save-dot { width:7px; height:7px; background:var(--gold); border-radius:50%; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  footer { text-align:center; padding-bottom:2rem; font-size:0.78rem; color:var(--gold-light); letter-spacing:0.1em; text-transform:uppercase; position:relative; z-index:1; }

  /* CHART */
  .chart-wrap { margin-top:1.5rem; animation:fadeUp 0.4s ease; }
  .chart-title { font-size:0.82rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-light); text-align:center; margin-bottom:1rem; }
  .chart-room { background:var(--cream); border:1px solid var(--border); border-radius:2px; padding:1rem; overflow-x:auto; }
  .chart-top-label { text-align:center; font-size:0.82rem; color:var(--gold-dark); font-style:italic; margin-bottom:0.8rem; letter-spacing:0.04em; }
  .chart-bottom-label { text-align:center; font-size:0.82rem; color:var(--text-light); font-style:italic; margin-top:0.8rem; }
  .chart-grid { display:inline-block; min-width:100%; }
  .chart-header, .chart-row { display:flex; gap:4px; margin-bottom:4px; align-items:center; }
  .chart-seat-num { width:20px; font-size:0.65rem; color:var(--text-light); text-align:right; flex-shrink:0; }
  .chart-col-label { flex:1; text-align:center; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-light); padding:0.3rem 0; font-family:'Playfair Display',serif; }
  .chart-col-label.active { color:var(--gold-dark); font-weight:600; }
  .chart-seat { flex:1; height:28px; border-radius:2px; border:1px solid rgba(201,168,76,0.2); background:var(--warm-white); display:flex; align-items:center; justify-content:center; font-size:0.68rem; color:var(--text-light); transition:all 0.2s; min-width:36px; }
  .chart-seat.highlight { background:rgba(201,168,76,0.12); border-color:rgba(201,168,76,0.4); color:var(--gold-dark); }
  .chart-seat.match { background:var(--gold); border-color:var(--gold-dark); color:#fff; font-weight:700; transform:scale(1.08); box-shadow:0 2px 8px rgba(201,168,76,0.4); }
  .chart-you { font-size:0.6rem; letter-spacing:0.05em; }
  .chart-legend { display:flex; gap:1.2rem; justify-content:center; margin-top:0.8rem; }
  .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.78rem; color:var(--text-light); }
  .legend-dot { width:12px; height:12px; border-radius:2px; }
  .legend-dot.match { background:var(--gold); }
  .legend-dot.highlight { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.4); }
  .chart-instructions { margin-top:1rem; padding:0.9rem 1.2rem; background:rgba(201,168,76,0.06); border:1px solid var(--border); border-radius:2px; font-size:0.88rem; color:var(--text-light); line-height:1.6; text-align:center; }
  .chart-instructions strong { color:var(--text); }

  /* MULTIPLE RESULTS */
  .multi-wrap { margin-top:0.5rem; border:1px solid var(--border); border-radius:2px; overflow:hidden; }
  .multi-title { padding:0.8rem 1rem; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-light); background:var(--cream); border-bottom:1px solid var(--border); }
  .multi-item { display:flex; align-items:center; gap:0.8rem; padding:0.9rem 1rem; border-bottom:1px solid rgba(201,168,76,0.1); cursor:pointer; transition:background 0.15s; background:var(--warm-white); }
  .multi-item:last-child { border-bottom:none; }
  .multi-item:hover { background:rgba(201,168,76,0.06); }
  .multi-item:active { background:rgba(201,168,76,0.12); }
  .multi-name { font-family:'Playfair Display',serif; font-size:1.05rem; font-style:italic; color:var(--text); flex:1; }
  .multi-seat { font-size:0.8rem; color:var(--gold-dark); letter-spacing:0.06em; white-space:nowrap; }
  .multi-arrow { color:var(--gold); font-size:1rem; }
</style>
</head>
<body>
<div class="page">

<header>
  <span class="ornament">✦ ✦ ✦</span>
  <h1>Find Your <em>Seat</em></h1>
  <p class="subtitle">Enter your name to discover your seat</p>
  <div class="divider"><div class="divider-diamond"></div></div>
</header>

<main>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('guest')">Guest Lookup</button>
      <button class="tab-btn" id="adminTabBtn" style="display:none" onclick="switchTab('admin')">Admin ⚙</button>
    </div>

    <!-- GUEST TAB -->
    <div id="tab-guest" class="tab-panel active">
      <div id="guestLoading" class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading guest list...</div>
      </div>
      <div id="guestForm" style="display:none">
        <label class="form-label" for="nameInput">Your Name</label>
        <div class="search-wrap">
          <input type="text" id="nameInput" placeholder="e.g. Tolulope Adeyina" autocomplete="off"
                 onkeydown="if(event.key==='Enter') findSeat()" />
          <button class="btn" onclick="findSeat()">Find My Seat</button>
        </div>
      </div>
      <div id="result"></div>
    </div>

    <!-- ADMIN TAB -->
    <div id="tab-admin" class="tab-panel">
      <p class="admin-intro">
        Edit guest names below. Click <strong>Save Changes</strong> to update the Google Sheet — guests see changes instantly.
      </p>

      <div id="adminLoading" class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading from Google Sheet...</div>
      </div>

      <div id="adminContent" style="display:none">
        <div class="col-tabs">
          <button class="col-tab active" onclick="selectCol('A')">Column A</button>
          <button class="col-tab" onclick="selectCol('B')">Column B</button>
          <button class="col-tab" onclick="selectCol('C')">Column C</button>
          <button class="col-tab" onclick="selectCol('D')">Column D</button>
        </div>

        <div class="col-progress" id="colProgress"></div>
        <div class="seat-grid" id="seatGrid"></div>

        <div class="section-head">All Columns Overview</div>
        <div class="all-columns-grid" id="allColsGrid"></div>

        <div class="actions">
          <button class="btn" onclick="saveChanges()">Save Changes</button>
          <button class="btn btn-outline" onclick="loadFromSheet()">Refresh</button>
          <div class="save-indicator" id="saveIndicator">
            <div class="save-dot"></div> Saving...
          </div>
        </div>
        <div id="adminStatus"></div>
      </div>
    </div>
  </div>
</main>

<footer>With love &nbsp;✦&nbsp; Faridah & Michael</footer>
</div>

<script>
const SHEETDB = 'https://sheetdb.io/api/v1/jzg52r6mc7qt3';
const COLS = ['A','B','C','D'];
const SEATS = 15;

let guests = []; // raw array from sheet: [{Name, Column, Seat}]
let seats = {};  // structured: seats[col][seat] = name
let currentCol = 'A';
let isAdmin = false;

// ── INIT ──
(function init() {
  isAdmin = location.search.includes('admin');
  if (isAdmin) document.getElementById('adminTabBtn').style.display = 'block';
  loadFromSheet();
})();

// ── LOAD FROM SHEETDB ──
async function loadFromSheet() {
  try {
    const res = await fetch(SHEETDB);
    if (!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();
    guests = data;
    buildSeatsFromGuests();

    // Show guest form
    document.getElementById('guestLoading').style.display = 'none';
    document.getElementById('guestForm').style.display = 'block';

    // Show admin content
    if (isAdmin) {
      document.getElementById('adminLoading').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
      renderGrid(); renderAllCols(); updateProgress();
    }
  } catch(e) {
    document.getElementById('guestLoading').innerHTML =
      '<div class="status error">Could not load guest list. Please refresh and try again.</div>';
    if (isAdmin) {
      document.getElementById('adminLoading').innerHTML =
        '<div class="status error">Could not connect to Google Sheet. Please refresh.</div>';
    }
  }
}

function buildSeatsFromGuests() {
  seats = {};
  COLS.forEach(c => { seats[c] = {}; for(let s=1;s<=SEATS;s++) seats[c][s]=''; });
  guests.forEach(g => {
    const col = (g.Column || '').trim().toUpperCase();
    const seat = parseInt(g.Seat);
    const name = (g.Name || '').trim();
    if (COLS.includes(col) && seat >= 1 && seat <= SEATS && name) {
      seats[col][seat] = name;
    }
  });
}

// ── SAVE TO SHEETDB ──
async function saveChanges() {
  const indicator = document.getElementById('saveIndicator');
  const statusEl = document.getElementById('adminStatus');
  indicator.classList.add('show');
  statusEl.innerHTML = '';

  try {
    // Build new rows array
    const newRows = [];
    COLS.forEach(col => {
      for(let s=1; s<=SEATS; s++) {
        const name = seats[col][s] || '';
        newRows.push({ Name: name, Column: col, Seat: String(s) });
      }
    });

    // Delete all existing rows then re-insert
    await fetch(SHEETDB + '/all', { method: 'DELETE' });
    await fetch(SHEETDB, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: newRows })
    });

    // Reload fresh data
    await loadFromSheet();
    indicator.classList.remove('show');
    statusEl.innerHTML = '<div class="status success">✓ Saved! Guests can see the updated list right away.</div>';
    setTimeout(() => statusEl.innerHTML = '', 4000);
  } catch(e) {
    indicator.classList.remove('show');
    statusEl.innerHTML = '<div class="status error">Save failed. Check your internet and try again.</div>';
  }
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['guest','admin'][i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab === 'admin' && document.getElementById('adminContent').style.display === 'none') {
    // still loading
  }
}

// ── COLUMN SELECTION ──
function selectCol(col) {
  currentCol = col;
  document.querySelectorAll('.col-tab').forEach((b,i) => b.classList.toggle('active', COLS[i]===col));
  renderGrid(); updateProgress();
}

function updateProgress() {
  const filled = Object.values(seats[currentCol]).filter(v=>v.trim()).length;
  document.getElementById('colProgress').innerHTML =
    `Column ${currentCol} — <span>${filled}</span> of ${SEATS} seats filled`;
}

function renderGrid() {
  const grid = document.getElementById('seatGrid');
  grid.innerHTML = '';
  for(let s=1; s<=SEATS; s++) {
    const val = seats[currentCol][s] || '';
    const wrap = document.createElement('div');
    wrap.className = 'seat-input-wrap';
    wrap.innerHTML = `
      <span class="seat-input-label">Seat ${s}</span>
      <input class="seat-input${val?' filled':''}" type="text"
             placeholder="Guest name" value="${escAttr(val)}"
             data-seat="${s}"
             oninput="updateSeat(this); this.classList.toggle('filled',this.value.trim().length>0)" />`;
    grid.appendChild(wrap);
  }
}

function updateSeat(input) {
  seats[currentCol][parseInt(input.dataset.seat)] = input.value.trim();
  renderAllCols(); updateProgress();
}

function renderAllCols() {
  const grid = document.getElementById('allColsGrid');
  grid.innerHTML = '';
  COLS.forEach(col => {
    const filled = Object.values(seats[col]).filter(v=>v.trim()).length;
    let rows = '';
    for(let s=1; s<=SEATS; s++) {
      const name = seats[col][s];
      if(name) rows += `<div class="col-summary-row"><span>${escHtml(name)}</span><span class="sn">S${s}</span></div>`;
    }
    if(!rows) rows = `<div class="col-summary-empty">No guests yet</div>`;
    const div = document.createElement('div');
    div.className = 'col-summary';
    div.innerHTML = `
      <div class="col-summary-head">Column ${col}<span class="col-summary-count">${filled}/${SEATS}</span></div>
      <div class="col-summary-body">${rows}</div>`;
    grid.appendChild(div);
  });
}

// ── FIND SEAT ──
function findSeat() {
  const query = document.getElementById('nameInput').value.trim().toLowerCase();
  const el = document.getElementById('result');
  if(!query) { el.innerHTML=''; return; }

  if(!guests.length) {
    el.innerHTML = `<div class="result-not-found">Guest list is still loading. Please wait a moment and try again.</div>`;
    return;
  }

  // Collect ALL matches that include the query
  let matches = [];
  for(const col of COLS) {
    for(let s=1; s<=SEATS; s++) {
      const n = (seats[col][s]||'').trim().toLowerCase();
      if(n && n.includes(query)) matches.push({col, seat:s, name:seats[col][s]});
    }
  }

  if(matches.length === 0) {
    el.innerHTML = `<div class="result-not-found">We couldn't find "<em>${escHtml(query)}</em>" — try a different spelling or ask the host.</div>`;
  } else if(matches.length === 1) {
    // Single match — show full result + chart
    const match = matches[0];
    el.innerHTML = `
      <div class="result-found">
        <div class="greeting">Welcome,</div>
        <div class="guest-name">${escHtml(match.name)}</div>
        <div class="seat-cards">
          <div class="seat-card"><span class="sc-label">Column</span><span class="sc-value">${escHtml(match.col)}</span></div>
          <div class="seat-card"><span class="sc-label">Seat</span><span class="sc-value">${match.seat}</span></div>
        </div>
        <div class="result-extra">We're so glad you're here 🌿</div>
      </div>
      ${buildChart(match.col, match.seat)}`;
  } else {
    // Multiple matches — list all, let them tap their name
    const items = matches.map(m => `
      <div class="multi-item" onclick="showSingleResult('${escAttr(m.name)}','${m.col}',${m.seat})">
        <div class="multi-name">${escHtml(m.name)}</div>
        <div class="multi-seat">Column ${escHtml(m.col)} · Seat ${m.seat}</div>
        <div class="multi-arrow">→</div>
      </div>`).join('');

    el.innerHTML = `
      <div class="multi-wrap">
        <div class="multi-title">We found ${matches.length} guests — tap your name:</div>
        ${items}
      </div>`;
  }
}

function showSingleResult(name, col, seat) {
  const el = document.getElementById('result');
  const colIndex = COLS.indexOf(col);
  el.innerHTML = `
    <div class="result-found">
      <div class="greeting">Welcome,</div>
      <div class="guest-name">${escHtml(name)}</div>
      <div class="seat-cards">
        <div class="seat-card"><span class="sc-label">Column</span><span class="sc-value">${escHtml(col)}</span></div>
        <div class="seat-card"><span class="sc-label">Seat</span><span class="sc-value">${seat}</span></div>
      </div>
      <div class="result-extra">We're so glad you're here 🌿</div>
    </div>
    ${buildChart(col, parseInt(seat))}
    <button class="btn btn-outline" style="margin-top:1rem;width:100%" onclick="findSeat()">← Back to results</button>`;
}

function buildChart(matchCol, matchSeat) {
  const colIndex = COLS.indexOf(matchCol); // 0=A,1=B,2=C,3=D

  // Build column headers
  let headerCells = COLS.map((c,i) => `<div class="chart-col-label${i===colIndex?' active':''}">${c}</div>`).join('');

  // Build seat rows
  let rows = '';
  for(let s=1; s<=SEATS; s++) {
    let cells = COLS.map((c,i) => {
      const isMatch = i===colIndex && s===matchSeat;
      const isCol = i===colIndex && s!==matchSeat;
      return `<div class="chart-seat${isMatch?' match':isCol?' highlight':''}">
        ${isMatch ? `<span class="chart-you">YOU</span>` : s}
      </div>`;
    }).join('');
    rows += `<div class="chart-row"><div class="chart-seat-num">${s}</div>${cells}</div>`;
  }

  return `
    <div class="chart-wrap">
      <div class="chart-title">📍 Your Location in the Room</div>
      <div class="chart-room">
        <div class="chart-top-label">🌸 Couple's Table — Front of Room 🌸</div>
        <div class="chart-grid">
          <div class="chart-header">
            <div class="chart-seat-num"></div>
            ${headerCells}
          </div>
          ${rows}
        </div>
        <div class="chart-bottom-label">⬇ Entrance</div>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot match"></div> Your seat</div>
        <div class="legend-item"><div class="legend-dot highlight"></div> Your column</div>
      </div>
      <div class="chart-instructions">
        Head to <strong>Column ${matchCol}</strong> (${colIndex===0?'far left':colIndex===1?'second from left':colIndex===2?'second from right':'far right'}) —
        <strong>Seat ${matchSeat}</strong> from the front
        or <strong>Seat ${SEATS - matchSeat + 1}</strong> from the back (entrance).
      </div>
    </div>`;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return escHtml(s);}
</script>
